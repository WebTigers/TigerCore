; Tiger core ACL policy — the canonical role graph + baseline. TIGER-OWNED.
; Loaded by Tiger_Acl_Acl (ini first = canonical), then DB rows layer on top.
; Modules ship their own configs/acl.ini for their resources + rules.
;
; Roles here are the role NAMES stored in org_user.role (role-on-membership). The
; whole policy is DATA — deny-all baseline, god-mode, and public exemptions — the
; engine hard-codes nothing.
[production]

; --- Roles (parent-before-child is resolved topologically) ------------------
acl.roles.guest.role         = "guest"
acl.roles.guest.description  = "Unauthenticated request"

acl.roles.user.role          = "user"
acl.roles.user.parent        = "guest"
acl.roles.user.description   = "Authenticated, no/any org context"

acl.roles.viewer.role        = "viewer"
acl.roles.viewer.parent      = "user"
acl.roles.viewer.description = "Read-only org member"

acl.roles.member.role        = "member"
acl.roles.member.parent      = "viewer"
acl.roles.member.description = "Org member"

acl.roles.manager.role       = "manager"
acl.roles.manager.parent     = "member"
acl.roles.manager.description= "Org manager"

acl.roles.admin.role         = "admin"
acl.roles.admin.parent       = "manager"
acl.roles.admin.description  = "Org administrator"

acl.roles.owner.role         = "owner"
acl.roles.owner.parent       = "admin"
acl.roles.owner.description  = "Org owner"

acl.roles.superadmin.role        = "superadmin"
acl.roles.superadmin.parent      = "user"
acl.roles.superadmin.description = "Platform administrator"

acl.roles.developer.role         = "developer"
acl.roles.developer.parent       = "superadmin"
acl.roles.developer.description  = "God mode"

; --- Resources (default-namespace public entry points) ----------------------
acl.resources.index.resource = "IndexController"
acl.resources.auth.resource  = "AuthController"
acl.resources.api.resource   = "ApiController"
acl.resources.error.resource = "ErrorController"

; --- Rules ------------------------------------------------------------------
; Baseline: deny everything to everyone (the deny-by-default spine).
acl.rules.denyall.role       = "*"
acl.rules.denyall.resource   = "*"
acl.rules.denyall.privilege  = "*"
acl.rules.denyall.permission = "deny"

; God mode: developer may do anything.
acl.rules.dev.role       = "developer"
acl.rules.dev.resource   = "*"
acl.rules.dev.privilege  = "*"
acl.rules.dev.permission = "allow"

; Public entry points — allowed to guests (and, by inheritance, everyone).
acl.rules.pub_index.role       = "guest"
acl.rules.pub_index.resource   = "IndexController"
acl.rules.pub_index.permission = "allow"

acl.rules.pub_auth.role       = "guest"
acl.rules.pub_auth.resource   = "AuthController"
acl.rules.pub_auth.permission = "allow"

; /api is public at the gateway; the ServiceFactory gates each SERVICE by its own ACL.
acl.rules.pub_api.role       = "guest"
acl.rules.pub_api.resource   = "ApiController"
acl.rules.pub_api.permission = "allow"

acl.rules.pub_error.role       = "guest"
acl.rules.pub_error.resource   = "ErrorController"
acl.rules.pub_error.permission = "allow"

[staging : production]

[testing : production]

[development : production]
