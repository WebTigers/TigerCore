; Blog module ACL — TIGER-OWNED (first-party module).
;
; The authoring surface is admin-and-above; the deny-by-default spine in core acl.ini
; governs everyone else. Resource names follow the framework convention —
; Tiger_Controller_Plugin_Authorization resolves a module controller to
; "<Module>_<Controller>Controller", and Tiger_Ajax_ServiceFactory resolves a service
; to "<Module>_Service_<Name>".
[production]

; PUBLIC front-end (index / article / archives / feed) — guest-allowed (everyone).
acl.resources.blog_index_ctrl.resource = "Blog_IndexController"
acl.rules.blog_pub.role       = "guest"
acl.rules.blog_pub.resource   = "Blog_IndexController"
acl.rules.blog_pub.permission = "allow"

acl.resources.blog_post_ctrl.resource = "Blog_PostController"
acl.resources.blog_post_svc.resource  = "Blog_Service_Post"
acl.resources.blog_tax_svc.resource   = "Blog_Service_Taxonomy"

acl.rules.blog_post_ctrl.role       = "admin"
acl.rules.blog_post_ctrl.resource   = "Blog_PostController"
acl.rules.blog_post_ctrl.permission = "allow"

acl.rules.blog_post_svc.role       = "admin"
acl.rules.blog_post_svc.resource   = "Blog_Service_Post"
acl.rules.blog_post_svc.permission = "allow"

acl.rules.blog_tax_svc.role       = "admin"
acl.rules.blog_tax_svc.resource   = "Blog_Service_Taxonomy"
acl.rules.blog_tax_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
