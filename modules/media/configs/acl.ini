; Media module ACL — TIGER-OWNED. Admin-and-above; deny-by-default handles everyone else.
[production]

acl.resources.media_index_ctrl.resource = "Media_IndexController"
acl.resources.media_file_ctrl.resource  = "Media_FileController"
acl.resources.media_svc.resource        = "Media_Service_Media"

acl.rules.media_index_ctrl.role       = "admin"
acl.rules.media_index_ctrl.resource   = "Media_IndexController"
acl.rules.media_index_ctrl.permission = "allow"

acl.rules.media_file_ctrl.role       = "admin"
acl.rules.media_file_ctrl.resource   = "Media_FileController"
acl.rules.media_file_ctrl.permission = "allow"

acl.rules.media_svc.role       = "admin"
acl.rules.media_svc.resource   = "Media_Service_Media"
acl.rules.media_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
