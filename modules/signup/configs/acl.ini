; Signup module ACL — TIGER-OWNED (first-party). Public account creation, so the screen
; and the create service are allowed to GUESTS (deny-by-default governs everyone else).
; Convenience validation rides Tiger_Service_Validate, which carries its own guest allow in
; core acl.ini — no rule needed here for it.
[production]

acl.resources.signup_ctrl.resource = "Signup_IndexController"
acl.resources.signup_svc.resource  = "Signup_Service_Signup"

acl.rules.signup_ctrl.role       = "guest"
acl.rules.signup_ctrl.resource   = "Signup_IndexController"
acl.rules.signup_ctrl.permission = "allow"

acl.rules.signup_svc.role       = "guest"
acl.rules.signup_svc.resource   = "Signup_Service_Signup"
acl.rules.signup_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
