; TigerSEO ACL — /sitemap.xml and /robots.txt are PUBLIC (crawlers hit them unauthenticated), so the
; guest role is allowed both controllers. Deny-by-default means a route with no rule is refused, so these
; explicit guest allows are what make the two routes reachable at all. (The head plugin needs no rule —
; it's a front-controller plugin, not a controller/service.)
[production]

acl.resources.seo_sitemap_ctrl.resource = "Seo_SitemapController"
acl.resources.seo_robots_ctrl.resource  = "Seo_RobotsController"
acl.resources.seo_llms_ctrl.resource    = "Seo_LlmsController"

acl.rules.seo_sitemap_guest.role       = "guest"
acl.rules.seo_sitemap_guest.resource   = "Seo_SitemapController"
acl.rules.seo_sitemap_guest.permission = "allow"

acl.rules.seo_robots_guest.role       = "guest"
acl.rules.seo_robots_guest.resource   = "Seo_RobotsController"
acl.rules.seo_robots_guest.permission = "allow"

acl.rules.seo_llms_guest.role       = "guest"
acl.rules.seo_llms_guest.resource   = "Seo_LlmsController"
acl.rules.seo_llms_guest.permission = "allow"

[staging : production]

[testing : production]

[development : production]
